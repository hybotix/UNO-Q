name: VL53L5CX Validator
icon: 🎯
description: Validates VL53L5CX distance accuracy at 50, 100, 250, 500mm. All 64 zones evaluated, +/-50mm tolerance, 10 frames per point.
profiles:
  default:
    platforms:
      - platform: arduino:zephyr
    libraries:
      - Arduino_RouterBridge (0.3.0)
      - dependency: Arduino_RPClite (0.2.1)
      - dependency: ArxContainer (0.7.0)
      - dependency: ArxTypeTraits (0.3.2)
      - dependency: DebugLog (0.8.4)
      - dependency: MsgPack (0.4.2)
      - dir: /home/arduino/Arduino/libraries/hybx_vl53l5cx
default_profile: default
